    <script>
        (function () {
            var views = {
                home: document.getElementById('view-home'),
                life: document.getElementById('view-life'),
                moments: document.getElementById('view-moments'),
                keepsakes: document.getElementById('view-keepsakes'),
                cooking: document.getElementById('view-cooking'),
                campus: document.getElementById('view-campus')
            };
            var titles = {
                home: 'Trọng Hiếu - Timebox',
                life: 'Góc riêng - Trọng Hiếu',
                moments: 'Kỷ niệm - Trọng Hiếu'
            };
            titles.campus = 'Sinh viên - Trọng Hiếu';
            titles.keepsakes = 'Tạm lưu tạm giữ - Trọng Hiếu';
            titles.cooking = 'Nấu ăn - Trọng Hiếu';
            var currentView = null;
            var currentDepth = 0;

            function getViewFromUrl() {
                var params = new URLSearchParams(window.location.search);
                var view = params.get('view') || 'home';
                return views[view] ? view : 'home';
            }

            function getViewUrl(id) {
                var url = new URL(window.location.href);
                if (id === 'home') {
                    url.searchParams.delete('view');
                } else {
                    url.searchParams.set('view', id);
                }
                return url.pathname + url.search + url.hash;
            }

            function setView(id, direction) {
                if (!views[id] || id === currentView) return;
                Object.keys(views).forEach(function (key) {
                    views[key].classList.add('is-hidden');
                    views[key].classList.remove('anim-enter-right', 'anim-enter-left');
                });
                views[id].classList.remove('is-hidden');
                void views[id].offsetWidth;
                views[id].classList.add(direction === 'back' ? 'anim-enter-left' : 'anim-enter-right');
                currentView = id;
                document.title = titles[id] || 'Timebox';
                window.scrollTo(0, 0);
            }

            function goForward(id) {
                if (!views[id]) return;
                currentDepth += 1;
                history.pushState({ spaView: id, spaDepth: currentDepth }, '', getViewUrl(id));
                setView(id, 'forward');
            }

            function goToParent() {
                var parent = currentView === 'keepsakes' ? 'moments' :
                    (currentView === 'moments' || currentView === 'campus' || currentView === 'cooking' ? 'life' : 'home');
                currentDepth = 0;
                history.replaceState({ spaView: parent, spaDepth: currentDepth }, '', getViewUrl(parent));
                setView(parent, 'back');
            }

            function goBack() {
                if (currentDepth > 0) {
                    history.back();
                } else if (currentView !== 'home') {
                    goToParent();
                }
            }

            window.addEventListener('popstate', function (e) {
                var nextView = e.state && e.state.spaView ? e.state.spaView : getViewFromUrl();
                var nextDepth = e.state && typeof e.state.spaDepth === 'number' ? e.state.spaDepth : 0;
                var direction = nextDepth < currentDepth ? 'back' : 'forward';
                currentDepth = nextDepth;
                setView(nextView, direction);
            });

            var btnGoLife = document.getElementById('btn-go-life');
            var btnGoMoments = document.getElementById('btn-go-moments');
            var btnGoKeepsakes = document.getElementById('btn-go-keepsakes');
            var btnGoCooking = document.getElementById('btn-go-cooking');
            var btnGoCampus = document.getElementById('btn-go-campus');
            var btnBackLife = document.getElementById('btn-back-life');
            var btnBackKeepsakes = document.getElementById('btn-back-keepsakes');
            var btnBackCooking = document.getElementById('btn-back-cooking');
            var btnBackCampus = document.getElementById('btn-back-campus');

            if (btnGoLife) btnGoLife.addEventListener('click', function () { goForward('life'); });
            if (btnGoMoments) btnGoMoments.addEventListener('click', function () { goForward('moments'); });
            if (btnGoKeepsakes) btnGoKeepsakes.addEventListener('click', function () { goForward('keepsakes'); });
            if (btnGoCooking) btnGoCooking.addEventListener('click', function () { goForward('cooking'); });
            if (btnGoCampus) btnGoCampus.addEventListener('click', function () { goForward('campus'); });
            if (btnBackLife) btnBackLife.addEventListener('click', goBack);
            if (btnBackKeepsakes) btnBackKeepsakes.addEventListener('click', goBack);
            if (btnBackCooking) btnBackCooking.addEventListener('click', goBack);
            if (btnBackCampus) btnBackCampus.addEventListener('click', goBack);

            window._spaGoBack = goBack;

            var initialView = getViewFromUrl();
            history.replaceState({ spaView: initialView, spaDepth: currentDepth }, '', getViewUrl(initialView));
            setView(initialView, 'forward');
        })();
    </script>
    <script>
        /* ── Upload Modal ── */
        (function () {
            var modal = document.getElementById('upload-modal');
            var backdrop = document.getElementById('upload-modal-backdrop');
            var closeBtn = document.getElementById('upload-modal-close');
            var dropzone = document.getElementById('upload-dropzone');
            var preview = document.getElementById('upload-preview');
            var sendBtn = document.getElementById('upload-send-btn');
            var statusEl = document.getElementById('upload-status');
            var fileInput = document.getElementById('upload-input');
            var openBtn = document.getElementById('btn-upload-open');

            var CLOUD_NAME = 'dtpw5htqs';
            var UPLOAD_PRESET = 'Upload_img';
            var MAX_FILES = 10;
            var MAX_SIZE = 20 * 1024 * 1024;
            var selected = [];
            var uploading = false;
            var statusTimer = null;

            function openModal() {
                document.body.classList.add('is-modal-open');
                modal.classList.add('is-open');
                modal.setAttribute('aria-hidden', 'false');
            }

            function closeModal() {
                if (uploading) return;
                document.body.classList.remove('is-modal-open');
                modal.classList.remove('is-open');
                modal.setAttribute('aria-hidden', 'true');
            }

            function setStatus(msg, duration, cb) {
                clearTimeout(statusTimer);
                statusEl.textContent = msg || '';
                statusEl.classList.toggle('upload-modal__status--visible', Boolean(msg));
                if (msg && duration) {
                    statusTimer = setTimeout(function () {
                        statusEl.classList.remove('upload-modal__status--visible');
                        if (cb) cb();
                    }, duration);
                }
            }

            function renderPreview() {
                preview.innerHTML = '';
                if (!selected.length) {
                    preview.hidden = true;
                    dropzone.hidden = false;
                    sendBtn.hidden = true;
                    return;
                }
                selected.forEach(function (file, i) {
                    var wrap = document.createElement('div');
                    wrap.className = 'upload-modal__preview-item';
                    var img = document.createElement('img');
                    img.alt = file.name;
                    img.src = URL.createObjectURL(file);
                    img.onload = function () { URL.revokeObjectURL(img.src); };
                    var rm = document.createElement('button');
                    rm.type = 'button';
                    rm.className = 'upload-modal__preview-remove';
                    rm.setAttribute('aria-label', 'Xóa');
                    rm.innerHTML = '&times;';
                    rm.addEventListener('click', function () {
                        selected.splice(i, 1);
                        renderPreview();
                    });
                    wrap.appendChild(img);
                    wrap.appendChild(rm);
                    preview.appendChild(wrap);
                });
                dropzone.hidden = true;
                preview.hidden = false;
                sendBtn.hidden = false;
            }

            function addFiles(files) {
                Array.prototype.forEach.call(files, function (f) {
                    if (selected.length >= MAX_FILES) { setStatus('Tối đa ' + MAX_FILES + ' ảnh'); return; }
                    if (!/^image\/(jpeg|png|webp|gif)$/i.test(f.type)) { setStatus('Chỉ nhận JPG, PNG, WEBP, GIF'); return; }
                    if (f.size > MAX_SIZE) { setStatus('Ảnh tối đa 20MB'); return; }
                    selected.push(f);
                });
                fileInput.value = '';
                renderPreview();
            }

            function uploadOne(file) {
                var fd = new FormData();
                fd.append('file', file);
                fd.append('upload_preset', UPLOAD_PRESET);
                return fetch('https://api.cloudinary.com/v1_1/' + CLOUD_NAME + '/image/upload', {
                    method: 'POST', body: fd
                }).then(function (r) { return r.json(); }).then(function (d) {
                    if (!d.secure_url) throw new Error('fail');
                    return d.secure_url;
                });
            }

            /* open */
            if (openBtn) openBtn.addEventListener('click', openModal);
            closeBtn.addEventListener('click', closeModal);
            backdrop.addEventListener('click', closeModal);
            document.addEventListener('keydown', function (e) { if (e.key === 'Escape') closeModal(); });

            /* pick files */
            dropzone.addEventListener('click', function () { fileInput.click(); });
            fileInput.addEventListener('change', function () { addFiles(fileInput.files); });

            /* drag & drop */
            dropzone.addEventListener('dragover', function (e) { e.preventDefault(); dropzone.classList.add('is-drag'); });
            dropzone.addEventListener('dragleave', function () { dropzone.classList.remove('is-drag'); });
            dropzone.addEventListener('drop', function (e) {
                e.preventDefault();
                dropzone.classList.remove('is-drag');
                addFiles(e.dataTransfer.files);
            });

            /* send */
            sendBtn.addEventListener('click', function () {
                if (!selected.length || uploading) return;
                var files = selected.slice();
                uploading = true;
                sendBtn.disabled = true;
                closeBtn.disabled = true;
                setStatus('Đang gửi ' + files.length + ' ảnh...');

                Promise.allSettled(files.map(uploadOne)).then(function (results) {
                    var ok = results.filter(function (r) { return r.status === 'fulfilled'; }).length;
                    var fail = files.length - ok;
                    selected = [];
                    renderPreview();
                    if (fail === 0) {
                        setStatus('Cảm ơn bạn đã gửi ảnh 🌷', 2200, closeModal);
                    } else if (ok > 0) {
                        setStatus('Gửi được ' + ok + '/' + files.length + ' ảnh 🌷', 3000, closeModal);
                    } else {
                        selected = files;
                        renderPreview();
                        setStatus('Gửi thất bại, thử lại nhé!', 3000);
                    }
                }).finally(function () {
                    uploading = false;
                    sendBtn.disabled = false;
                    closeBtn.disabled = false;
                });
            });
        })();
    </script>
    <script>
        (function () {
            var modal = document.getElementById('key-modal');
            var form = document.getElementById('key-form');
            var input = document.getElementById('key-input');
            var error = document.getElementById('key-error');
            var closeBtn = document.getElementById('key-close');
            var targetHref = '';
            var targetKeyHash = '';
            var targetErrorMsg = '';
            var defaultPlaceholder = '';
            var KEY_HASH = '4d18b69a768ca124246afb1ab533333f957d67650b8a9ef8c67ea7ffa7200c1a';

            function sha256(str) {
                var buf = new TextEncoder().encode(str);
                return crypto.subtle.digest('SHA-256', buf).then(function (hashBuf) {
                    return Array.from(new Uint8Array(hashBuf)).map(function (b) {
                        return b.toString(16).padStart(2, '0');
                    }).join('');
                });
            }

            function getUnlockStorageKey(url) {
                var targetUrl = new URL(url, window.location.href);
                var filename = targetUrl.pathname.split('/').filter(Boolean).pop() || targetUrl.pathname;
                return 'life-unlocked:' + filename;
            }

            function rememberUnlockedPage(url) {
                try { sessionStorage.setItem(getUnlockStorageKey(url), '1'); } catch (e) { }
            }

            function openModal(card) {
                targetHref = card ? card.getAttribute('data-locked-href') || '' : '';
                targetKeyHash = card ? card.getAttribute('data-key') || KEY_HASH : KEY_HASH;
                targetErrorMsg = 'X\u00e1c nh\u1eadn kh\u00f4ng th\u00e0nh c\u00f4ng';
                if (input) input.setAttribute('placeholder', card ? card.getAttribute('data-key-placeholder') || defaultPlaceholder : defaultPlaceholder);
                if (error) error.textContent = '';
                if (input) input.value = '';
                document.body.classList.add('is-modal-open');
                modal.classList.add('is-open');
                modal.setAttribute('aria-hidden', 'false');
                setTimeout(function () { if (input) input.focus(); }, 60);
            }

            function closeModal() {
                document.body.classList.remove('is-modal-open');
                modal.classList.remove('is-open');
                modal.setAttribute('aria-hidden', 'true');
                targetHref = '';
                targetKeyHash = '';
                targetErrorMsg = '';
                if (input) input.setAttribute('placeholder', defaultPlaceholder);
            }

            document.querySelectorAll('[data-locked-href]').forEach(function (card) {
                card.addEventListener('click', function () {
                    openModal(card);
                });
            });

            form.addEventListener('submit', function (e) {
                e.preventDefault();
                var keyValue = input.value.trim();
                if (!keyValue) {
                    error.textContent = 'Mở vô hiệu';
                    input.focus();
                    return;
                }
                var submitBtn = form.querySelector('button[type="submit"]');
                if (submitBtn) submitBtn.disabled = true;

                sha256(keyValue).then(function (hash) {
                    if (hash === targetKeyHash && targetHref) {
                        rememberUnlockedPage(targetHref);
                        var href = targetHref;
                        closeModal();
                        if (submitBtn) submitBtn.disabled = false;
                        window.location.href = href;
                    } else {
                        error.textContent = targetErrorMsg;
                        input.select();
                        if (submitBtn) submitBtn.disabled = false;
                    }
                });
            });

            closeBtn.addEventListener('click', closeModal);
            modal.querySelector('.key-modal__backdrop').addEventListener('click', closeModal);
            document.addEventListener('keydown', function (e) {
                if (e.key === 'Escape') closeModal();
            });
        })();
    </script>
