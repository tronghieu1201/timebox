<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Góc cá nhân – Trọng Hiếu</title>
    <meta name="description" content="Góc cá nhân của Trọng Hiếu – Nấu ăn, tâm sự, bạn bè và những khoảnh khắc đời thường.">
    <link rel="canonical" href="https://tronghieu1201.github.io/timebox/life.html">
    <link rel="icon" type="image/webp" href="https://res.cloudinary.com/dtpw5htqs/image/upload/v1782711381/43b58650-6952-47b7-9bac-94918d6b54a6_fcvxaq.webp">
    <link rel="apple-touch-icon" href="https://res.cloudinary.com/dtpw5htqs/image/upload/v1782711381/43b58650-6952-47b7-9bac-94918d6b54a6_fcvxaq.webp">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="life.css">
    <link rel="prefetch" href="./moments.html">
    <link rel="prefetch" href="./cooking.html">
    <link rel="prefetch" href="./campus.html">
</head>

<body>
    <!-- Background blobs -->
    <div class="blob blob--1" aria-hidden="true"></div>
    <div class="blob blob--2" aria-hidden="true"></div>
    <div class="blob blob--3" aria-hidden="true"></div>

    <main class="bio-card life-page">
        <!-- Page header -->
        <header class="life-header">
            <a href="./" class="life-back" id="life-back" aria-label="Quay lại trang bio">
                <i class="fas fa-arrow-left" aria-hidden="true"></i>
            </a>
            <h1 class="life-title">Góc riêng</h1>
        </header>

        <!-- Category Cards -->
        <section class="life-grid" aria-label="Danh mục">


            <!-- Kỷ niệm -->
            <button type="button" class="life-card life-card--button" onclick="navigateWithTransition('./moments.html')">
                <div class="life-card__icon">
                    <i class="fas fa-images" aria-hidden="true"></i>
                </div>
                <div class="life-card__body">
                    <h2 class="life-card__title">Kỷ niệm</h2>
                </div>
                <i class="fas fa-chevron-right life-card__arrow" aria-hidden="true"></i>
            </button>

            <!-- Lăng kính của Hiếu -->
            <a href="#" class="life-card" id="card-thoughts" data-category="thoughts">
                <div class="life-card__icon">
                    <i class="fas fa-eye" aria-hidden="true"></i>
                </div>
                <div class="life-card__body">
                    <h2 class="life-card__title">Lăng kính của Hiếu</h2>
                </div>
                <i class="fas fa-chevron-right life-card__arrow" aria-hidden="true"></i>
            </a>

            <!-- Sinh viên -->
            <button type="button" class="life-card life-card--button" onclick="navigateWithTransition('./campus.html')">
                <div class="life-card__icon">
                    <i class="fas fa-graduation-cap" aria-hidden="true"></i>
                </div>
                <div class="life-card__body">
                    <h2 class="life-card__title">Sinh viên</h2>
                </div>
                <i class="fas fa-chevron-right life-card__arrow" aria-hidden="true"></i>
            </button>

            <!-- Nấu ăn -->
            <button type="button" class="life-card life-card--button" onclick="navigateWithTransition('./cooking.html')">
                <div class="life-card__icon">
                    <i class="fas fa-utensils" aria-hidden="true"></i>
                </div>
                <div class="life-card__body">
                    <h2 class="life-card__title">Nấu ăn</h2>
                </div>
                <i class="fas fa-chevron-right life-card__arrow" aria-hidden="true"></i>
            </button>

            <!-- Feedback -->
            <button type="button" class="life-card life-card--button" id="card-join">
                <div class="life-card__icon">
                    <i class="fas fa-comment-dots" aria-hidden="true"></i>
                </div>
                <div class="life-card__body">
                    <h2 class="life-card__title">Feedback</h2>
                </div>
                <i class="fas fa-chevron-right life-card__arrow" aria-hidden="true"></i>
            </button>
        </section>

        <!-- Gallery modal (populated by JS) -->
        <div class="gallery-overlay" id="gallery-overlay" aria-hidden="true">
            <div class="gallery-panel">
                <div class="gallery-panel__header">
                    <h2 class="gallery-panel__title" id="gallery-title"></h2>
                    <button class="gallery-panel__close" id="gallery-close" aria-label="Đóng">&times;</button>
                </div>
                <div class="gallery-panel__grid" id="gallery-grid">
                    <!-- Images injected by JS -->
                </div>
                <p class="gallery-panel__quote" id="gallery-quote" hidden></p>
                <p class="gallery-panel__empty" id="gallery-empty">Chưa update. Hãy quay lại sau nhé!🌷</p>
                <div class="cooking-upload-widget moments-upload-widget" id="moments-upload-widget" aria-label="Upload ảnh" hidden>
                    <div class="cooking-upload-widget__hint" id="moments-upload-hint">
                        <i class="fas fa-camera hint-icon" aria-hidden="true"></i>
                        <span class="hint-label">Chọn ảnh để gửi</span>
                    </div>
                    <div class="cooking-upload-widget__preview" id="moments-upload-preview" hidden></div>
                    <button type="button" class="cooking-upload-widget__send" id="moments-send-btn" hidden>
                        <i class="fas fa-paper-plane" aria-hidden="true"></i>
                    </button>
                    <input type="file" id="moments-upload-input" accept="image/jpeg,image/png,image/webp,image/gif" multiple hidden>
                </div>
                <p class="cooking-upload-widget__status moments-upload-status" id="moments-upload-status" aria-live="polite"></p>
            </div>
        </div>
        <!-- Join modal -->
        <div class="join-modal" id="join-modal" role="dialog" aria-label="Feedback" aria-hidden="true">
            <div class="join-modal__backdrop"></div>
            <button type="button" class="join-modal__close" id="join-close" aria-label="Đóng">&times;</button>
            <article class="join-modal__card">
                <form class="join-form" id="join-form">
                    <input type="hidden" name="createdAt" id="join-created-at">
                    <label class="join-form__field">
                        <input type="text" id="join-content" name="content" placeholder="Nhập suy nghĩ..." required>
                    </label>
                    <button type="submit" class="join-form__submit">Gửi</button>
                </form>
            </article>
        </div>
    </main>

    <div class="life-toast" id="life-toast" role="status" aria-live="polite">
        Thằng Hiếu chưa cập nhật, hãy quay lại sau nhé! 🌷
    </div>

    <div class="key-modal" id="key-modal" role="dialog" aria-label="Nhap key" aria-hidden="true">
        <div class="key-modal__backdrop"></div>
        <article class="key-modal__card">
            <button type="button" class="key-modal__close" id="key-close" aria-label="Dong">&times;</button>
            <h2 class="key-modal__title">Xác nhận</h2>
            <form class="key-form" id="key-form">
                <input type="password" id="key-input" autocomplete="off" placeholder="">
                <button type="submit">Mở</button>
                <p class="key-modal__error" id="key-error" aria-live="polite"></p>
            </form>
        </article>
    </div>

    <script src="theme.js"></script>
    <script src="life.js"></script>
    <script>
        (function () {
            var modal = document.getElementById('key-modal');
            var form = document.getElementById('key-form');
            var input = document.getElementById('key-input');
            var error = document.getElementById('key-error');
            var closeBtn = document.getElementById('key-close');
            var AUTH_API = 'https://timebox.trghy.workers.dev/verify';
            var targetHref = '';
            var defaultPlaceholder = '';

            function getUnlockStorageKey(url) {
                var targetUrl = new URL(url, window.location.href);
                var filename = targetUrl.pathname.split('/').filter(Boolean).pop() || targetUrl.pathname;
                return 'life-unlocked:' + filename;
            }

            function rememberUnlockedPage(url) {
                try { sessionStorage.setItem(getUnlockStorageKey(url), '1'); } catch (e) {}
            }

            function openModal(card) {
                targetHref = card ? card.getAttribute('data-locked-href') || '' : '';
                if (input) input.setAttribute('placeholder', card ? card.getAttribute('data-key-placeholder') || defaultPlaceholder : defaultPlaceholder);
                if (error) error.textContent = '';
                if (input) input.value = '';
                document.body.classList.add('is-modal-open');
                modal.classList.add('is-open');
                modal.setAttribute('aria-hidden', 'false');
                setTimeout(function () { if (input) input.focus(); }, 60);
            }

            function closeModal() {
                document.body.classList.remove('is-modal-open');
                modal.classList.remove('is-open');
                modal.setAttribute('aria-hidden', 'true');
                targetHref = '';
                if (input) input.setAttribute('placeholder', defaultPlaceholder);
            }

            document.querySelectorAll('[data-locked-href]').forEach(function (card) {
                card.addEventListener('click', function () {
                    openModal(card);
                });
            });

            form.addEventListener('submit', function (e) {
                e.preventDefault();
                var keyValue = input.value.trim();
                if (!keyValue) {
                    error.innerHTML = 'Mở vô hiệu';
                    input.focus();
                    return;
                }
                var submitBtn = form.querySelector('button[type="submit"]');
                if (submitBtn) submitBtn.disabled = true;
                var scope = /friends/i.test(targetHref) ? 'friends' : 'family';

                fetch(AUTH_API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: keyValue, scope: scope })
                }).then(function (response) {
                    return response.json().catch(function () { return { ok: false }; });
                }).then(function (result) {
                    if (result.ok && targetHref) {
                        rememberUnlockedPage(targetHref);
                        var href = targetHref;
                        closeModal();
                        window.location.href = href;
                    } else {
                        error.innerHTML = 'Xác nhận không thành công';
                        input.select();
                    }
                }).catch(function () {
                    error.textContent = 'Kh\u00f4ng th\u1ec3 k\u1ebft n\u1ed1i m\u00e1y ch\u1ee7';
                    input.select();
                }).finally(function () {
                    if (submitBtn) submitBtn.disabled = false;
                });
            });

            closeBtn.addEventListener('click', closeModal);
            modal.querySelector('.key-modal__backdrop').addEventListener('click', closeModal);
            document.addEventListener('keydown', function (e) {
                if (e.key === 'Escape') closeModal();
            });
        })();
    </script>
</body>

</html>
