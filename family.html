    <script>
    // --- Thông báo gia đình ---
    (function () {
        var notice = document.createElement('div');
        notice.id = 'family-notice';
        notice.innerHTML =
            '<div class="fn-backdrop"></div>' +
            '<div class="fn-card">' +
                '<p class="fn-msg">Hiện tại ở messenger và drive bị hư nên mất hết ảnh gia đình, nên ai có ảnh gia đình ngày xưa hay là những sự kiện gia đình họp mặt thì có thể gửi ảnh tại đây nha ❤️</p>' +
                '<button type="button" class="fn-ok" id="fn-ok">Ok</button>' +
            '</div>';
        document.body.appendChild(notice);

        setTimeout(function () {
            notice.classList.add('is-open');
        }, 300);

        document.getElementById('fn-ok').addEventListener('click', function () {
            notice.classList.remove('is-open');
            notice.classList.add('is-closing');
            setTimeout(function () { notice.remove(); }, 280);
        });
    })();
    </script>
    <script>
    (function () {
        var CLOUD_NAME = 'dtpw5htqs';
        var UPLOAD_PRESET = 'Upload_img';
        var MAX_FILES = 10;
        var MAX_SIZE_MB = 20;
        var MAX_SIZE = MAX_SIZE_MB * 1024 * 1024;

        var selectedFiles = [];
        var isUploading = false;

        // --- Tạo modal upload ---
        var modal = document.createElement('div');
        modal.id = 'family-upload-modal';
        modal.setAttribute('aria-hidden', 'true');
        modal.innerHTML =
            '<div class="fup-backdrop"></div>' +
            '<div class="fup-panel">' +
                '<button type="button" class="fup-close" aria-label="Đóng">&times;</button>' +
                '<div class="fup-hint" id="fup-hint">' +
                    '<i class="fas fa-camera"></i>' +
                    '<span>Chọn ảnh để gửi</span>' +
                '</div>' +
                '<div class="fup-preview" id="fup-preview" hidden></div>' +
                '<button type="button" class="fup-send" id="fup-send" hidden>' +
                    '<i class="fas fa-paper-plane"></i>' +
                '</button>' +
                '<input type="file" id="fup-input" accept="image/jpeg,image/png,image/webp,image/gif" multiple hidden>' +
                '<p class="fup-status" id="fup-status" aria-live="polite"></p>' +
            '</div>';
        document.body.appendChild(modal);

        var backdrop = modal.querySelector('.fup-backdrop');
        var closeBtn = modal.querySelector('.fup-close');
        var hint = document.getElementById('fup-hint');
        var preview = document.getElementById('fup-preview');
        var sendBtn = document.getElementById('fup-send');
        var fileInput = document.getElementById('fup-input');
        var statusEl = document.getElementById('fup-status');
        var statusTimer = null;

        function openModal() {
            selectedFiles = [];
            renderPreview();
            clearStatus();
            modal.classList.add('is-open');
            modal.setAttribute('aria-hidden', 'false');
            document.body.classList.add('is-modal-open');
        }

        function closeModal() {
            if (isUploading) return;
            modal.classList.remove('is-open');
            modal.setAttribute('aria-hidden', 'true');
            document.body.classList.remove('is-modal-open');
        }

        function setStatus(msg, duration, onDone) {
            clearTimeout(statusTimer);
            statusEl.textContent = msg || '';
            statusEl.classList.toggle('is-visible', !!msg);
            if (msg && duration) {
                statusTimer = setTimeout(function () {
                    statusEl.classList.remove('is-visible');
                    if (typeof onDone === 'function') onDone();
                }, duration);
            }
        }

        function clearStatus() {
            clearTimeout(statusTimer);
            statusEl.textContent = '';
            statusEl.classList.remove('is-visible');
        }

        function renderPreview() {
            preview.innerHTML = '';
            if (!selectedFiles.length) {
                preview.hidden = true;
                hint.hidden = false;
                sendBtn.hidden = true;
                return;
            }
            selectedFiles.forEach(function (file, idx) {
                var item = document.createElement('div');
                item.className = 'fup-preview__item';
                var img = document.createElement('img');
                img.alt = file.name;
                var url = URL.createObjectURL(file);
                img.src = url;
                img.onload = function () { URL.revokeObjectURL(url); };
                var rm = document.createElement('button');
                rm.type = 'button';
                rm.className = 'fup-preview__remove';
                rm.setAttribute('aria-label', 'Xóa');
                rm.innerHTML = '&times;';
                rm.addEventListener('click', function () {
                    selectedFiles.splice(idx, 1);
                    renderPreview();
                });
                item.appendChild(img);
                item.appendChild(rm);
                preview.appendChild(item);
            });
            hint.hidden = true;
            preview.hidden = false;
            sendBtn.hidden = false;
        }

        function handleFiles(files) {
            var arr = Array.prototype.slice.call(files || []);
            fileInput.value = '';
            arr.forEach(function (f) {
                if (selectedFiles.length >= MAX_FILES) {
                    setStatus('Tối đa ' + MAX_FILES + ' ảnh');
                    return;
                }
                if (!/^image\/(jpeg|png|webp|gif)$/i.test(f.type)) {
                    setStatus('Chỉ nhận JPG, PNG, WEBP, GIF');
                    return;
                }
                if (f.size > MAX_SIZE) {
                    setStatus('Ảnh tối đa ' + MAX_SIZE_MB + 'MB');
                    return;
                }
                selectedFiles.push(f);
            });
            renderPreview();
        }

        function uploadOne(file) {
            var fd = new FormData();
            fd.append('file', file);
            fd.append('upload_preset', UPLOAD_PRESET);
            return fetch('https://api.cloudinary.com/v1_1/' + CLOUD_NAME + '/image/upload', {
                method: 'POST', body: fd
            }).then(function (r) { return r.json(); }).then(function (d) {
                if (!d.secure_url) throw new Error('Upload failed');
                return d.secure_url;
            });
        }

        hint.addEventListener('click', function () { fileInput.click(); });
        fileInput.addEventListener('change', function () { handleFiles(fileInput.files); });

        sendBtn.addEventListener('click', function () {
            if (!selectedFiles.length || isUploading) return;
            var toUpload = selectedFiles.slice();
            isUploading = true;
            sendBtn.disabled = true;
            closeBtn.disabled = true;
            setStatus('Đang gửi ' + toUpload.length + ' ảnh...');

            Promise.allSettled(toUpload.map(uploadOne)).then(function (results) {
                var ok = results.filter(function (r) { return r.status === 'fulfilled'; }).length;
                var fail = results.length - ok;
                selectedFiles = [];
                renderPreview();
                if (fail === 0) {
                    setStatus('Cảm ơn đã gửi ảnh 🌷', 2000, closeModal);
                } else if (ok > 0) {
                    setStatus('Gửi được ' + ok + '/' + toUpload.length + ' ảnh 🌷', 2500, closeModal);
                } else {
                    selectedFiles = toUpload;
                    renderPreview();
                    setStatus('Gửi thất bại, thử lại nhé!', 3000);
                }
            }).finally(function () {
                isUploading = false;
                sendBtn.disabled = false;
                closeBtn.disabled = false;
            });
        });

        backdrop.addEventListener('click', closeModal);
        closeBtn.addEventListener('click', closeModal);
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape') closeModal();
        });

        // Gắn nút mở
        var btnDesktop = document.getElementById('family-upload-open-desktop');
        var btnMobile = document.getElementById('family-upload-open-mobile');
        if (btnDesktop) btnDesktop.addEventListener('click', openModal);
        if (btnMobile) btnMobile.addEventListener('click', openModal);
    })();
    </script>
