<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moments – Trọng Hiếu</title>
    <meta name="description" content="Kỷ niệm của Trọng Hiếu – Những khoảnh khắc đáng nhớ.">
    <link rel="canonical" href="https://tronghieu1201.github.io/timebox/moments.html">
    <link rel="icon" type="image/webp" href="https://res.cloudinary.com/dtpw5htqs/image/upload/v1782711381/43b58650-6952-47b7-9bac-94918d6b54a6_fcvxaq.webp">
    <link rel="apple-touch-icon" href="https://res.cloudinary.com/dtpw5htqs/image/upload/v1782711381/43b58650-6952-47b7-9bac-94918d6b54a6_fcvxaq.webp">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="life.css">
    <link rel="prefetch" href="./keepsakes.html">
    <link rel="prefetch" href="./friends.html">
    <script>
        window.location.replace('./?view=moments');
    </script>
</head>

<body>
    <div class="blob blob--1" aria-hidden="true"></div>
    <div class="blob blob--2" aria-hidden="true"></div>
    <div class="blob blob--3" aria-hidden="true"></div>

    <main class="bio-card life-page">
        <header class="life-header">
            <a href="./?view=life" class="life-back" data-history-back data-back-fallback="./?view=life" aria-label="Về trang chủ">
                <i class="fas fa-arrow-left" aria-hidden="true"></i>
            </a>
            <h1 class="life-title">Kỷ niệm</h1>
        </header>

        <section class="life-grid" aria-label="Danh mục kỷ niệm">
            <!-- Lưu giữ -->
            <button type="button" class="life-card life-card--button" onclick="navigateWithTransition('./keepsakes.html')">
                <div class="life-card__icon"><i class="fas fa-infinity" aria-hidden="true"></i></div>
                <div class="life-card__body"><h2 class="life-card__title">Tạm lưu tạm giữ</h2></div>
                <i class="fas fa-chevron-right life-card__arrow" aria-hidden="true"></i>
            </button>

            <!-- Bạn bè (locked) -->
            <button type="button" class="life-card life-card--button" data-locked-href="./friends.html" data-key-placeholder="" data-key-error="Mở vô hiệu">
                <div class="life-card__icon"><i class="fas fa-users" aria-hidden="true"></i></div>
                <div class="life-card__body"><h2 class="life-card__title">Những thằng cốt đột</h2></div>
                <i class="fas fa-chevron-right life-card__arrow" aria-hidden="true"></i>
            </button>
        </section>
    </main>

    <!-- Key modal -->
    <div class="key-modal" id="key-modal" role="dialog" aria-label="Nhap key" aria-hidden="true">
        <div class="key-modal__backdrop"></div>
        <article class="key-modal__card">
            <button type="button" class="key-modal__close" id="key-close" aria-label="Dong">&times;</button>
            <h2 class="key-modal__title">Xác nhận</h2>
            <form class="key-form" id="key-form">
                <input type="password" id="key-input" autocomplete="off" placeholder="">
                <button type="submit">Mở</button>
                <p class="key-modal__error" id="key-error" aria-live="polite"></p>
            </form>
        </article>
    </div>

    <script src="theme.js"></script>
    <script>
        (function () {
            var modal = document.getElementById('key-modal');
            var form = document.getElementById('key-form');
            var input = document.getElementById('key-input');
            var error = document.getElementById('key-error');
            var closeBtn = document.getElementById('key-close');
            var AUTH_API = 'https://timebox.trghy.workers.dev/verify';
            var targetHref = '';
            var targetErrorMsg = '';
            var defaultPlaceholder = '';

            function getUnlockStorageKey(url) {
                var targetUrl = new URL(url, window.location.href);
                var filename = targetUrl.pathname.split('/').filter(Boolean).pop() || targetUrl.pathname;
                return 'life-unlocked:' + filename;
            }

            function rememberUnlockedPage(url) {
                try { sessionStorage.setItem(getUnlockStorageKey(url), '1'); } catch (e) {}
            }

            function openModal(card) {
                targetHref = card ? card.getAttribute('data-locked-href') || '' : '';
                targetErrorMsg = 'X\u00e1c nh\u1eadn kh\u00f4ng th\u00e0nh c\u00f4ng';
                if (input) input.setAttribute('placeholder', card ? card.getAttribute('data-key-placeholder') || defaultPlaceholder : defaultPlaceholder);
                if (error) error.textContent = '';
                if (input) input.value = '';
                document.body.classList.add('is-modal-open');
                modal.classList.add('is-open');
                modal.setAttribute('aria-hidden', 'false');
                setTimeout(function () { if (input) input.focus(); }, 60);
            }

            function closeModal() {
                document.body.classList.remove('is-modal-open');
                modal.classList.remove('is-open');
                modal.setAttribute('aria-hidden', 'true');
                targetHref = '';
                targetErrorMsg = '';
                if (input) input.setAttribute('placeholder', defaultPlaceholder);
            }

            document.querySelectorAll('[data-locked-href]').forEach(function (card) {
                card.addEventListener('click', function () {
                    openModal(card);
                });
            });

            form.addEventListener('submit', function (e) {
                e.preventDefault();
                var keyValue = input.value.trim();
                if (!keyValue) {
                    error.textContent = 'Mở vô hiệu';
                    input.focus();
                    return;
                }
                var submitBtn = form.querySelector('button[type="submit"]');
                if (submitBtn) submitBtn.disabled = true;

                fetch(AUTH_API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: keyValue, scope: 'friends' })
                }).then(function (response) {
                    return response.json().catch(function () { return { ok: false }; });
                }).then(function (result) {
                    if (result.ok && targetHref) {
                        rememberUnlockedPage(targetHref);
                        var href = targetHref;
                        closeModal();
                        window.location.href = href;
                    } else {
                        error.textContent = targetErrorMsg;
                        input.select();
                    }
                }).catch(function () {
                    error.textContent = 'Kh\u00f4ng th\u1ec3 k\u1ebft n\u1ed1i m\u00e1y ch\u1ee7';
                    input.select();
                }).finally(function () {
                    if (submitBtn) submitBtn.disabled = false;
                });
            });

            closeBtn.addEventListener('click', closeModal);
            modal.querySelector('.key-modal__backdrop').addEventListener('click', closeModal);
            document.addEventListener('keydown', function (e) {
                if (e.key === 'Escape') closeModal();
            });
        })();
    </script>
</body>

</html>
